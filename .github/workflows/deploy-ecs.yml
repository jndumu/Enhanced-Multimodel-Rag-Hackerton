name: CI/CD — Test · Build · Terraform Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:       us-east-1
  ECR_REPOSITORY:   doc-intel-rag
  TF_WORKING_DIR:   terraform
  TF_VERSION:       "1.9.8"

jobs:
  # ── 1. Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        env:
          DOC_INTEL_SKIP_VALIDATION: "1"
          MESH_API_KEY: test-key
          API_KEYS: "[]"
          CORS_ORIGINS: '["*"]'
        run: uv run pytest tests/unit/ -q --tb=short

  # ── 2. Build and push Docker image to ECR ────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --image-scanning-configuration scanOnPush=true

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ steps.meta.outputs.tag }}
        run: |
          docker build -f docker/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── 3. Terraform plan (PRs) / apply (main) ───────────────────────────────────
  terraform:
    name: Terraform ${{ github.ref == 'refs/heads/main' && 'apply' || 'plan' }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' || github.base_ref == 'main'
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform format check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_mesh_api_key:   ${{ secrets.MESH_API_KEY }}
          TF_VAR_qdrant_url:     ${{ secrets.QDRANT_URL }}
          TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
          TF_VAR_cohere_api_key: ${{ secrets.COHERE_API_KEY }}
          TF_VAR_tavily_api_key: ${{ secrets.TAVILY_API_KEY }}
          TF_VAR_jina_api_key:   ${{ secrets.JINA_API_KEY }}
          TF_VAR_image_tag:      ${{ needs.build.outputs.image_tag }}
        run: terraform plan -input=false -out=tfplan -no-color
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by @${{ github.actor }}, action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_mesh_api_key:   ${{ secrets.MESH_API_KEY }}
          TF_VAR_qdrant_url:     ${{ secrets.QDRANT_URL }}
          TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
          TF_VAR_cohere_api_key: ${{ secrets.COHERE_API_KEY }}
          TF_VAR_tavily_api_key: ${{ secrets.TAVILY_API_KEY }}
          TF_VAR_jina_api_key:   ${{ secrets.JINA_API_KEY }}
          TF_VAR_image_tag:      ${{ needs.build.outputs.image_tag }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Deployment summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Terraform Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag**: ${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
